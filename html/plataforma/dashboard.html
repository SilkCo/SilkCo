<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" href="../../src/img/icon/logo.svg">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <link rel="stylesheet" href="../../src/css/global-style.css">
    <link rel="stylesheet" href="../../src/css/plataforma-style.css">
    <link rel="stylesheet" href="../../src/css/dashboard-style.css">
</head>
<body>
    <div class="left-menu">
        <div class="left-menu-content">
            <div class="left-menu-header">
                <button onclick="menuOnOff()">
                    <span>|||</span>
                </button>
            </div>

            <nav id="nav">
                <div class="nav-item active">
                    <a href="#">
                        <span class="nav-icon">
                            |||
                        </span>
                        <span class="nav-text">
                            Dashboard
                        </span>
                    </a>
                </div>

                <div class="nav-item">
                    <a href="">
                        <span class="nav-icon">
                            |||
                        </span>
                        <span class="nav-text">
                            Usuário
                        </span>
                    </a>
                </div>

                <div class="nav-item">
                    <a href="./empresa.html">
                        <span class="nav-icon">
                            |||
                        </span>
                        <span class="nav-text">
                            Empresa
                        </span>
                    </a>
                </div>
            </nav>
        </div>
    </div>

    <main>
        <div class="main-content">
            <div class="page-title">
                <span>Dashboard</span>
            </div>
            <div class="page-header">
                <span>Selecione o Galpão: </span>

                <select name="galpao" id="select_galpao" oninput="selecionarGalpao()">
                    <option hidden disabled selected>Selecione</option>
                    <option value="1">Galpão 1</option>
                    <option value="2">Galpão 2</option>
                </select>
            </div>

            <div class="dash-header">
                <div class="card">
                    <table>
                        <tr>
                            <th>Maior Temperatura</th>
                        </tr>
                        <tr>
                            <td id="maior_temp">' '</td>
                        </tr>
                    </table>
                    <table>
                        <tr>
                            <th>Menor Temperatura</th>
                        </tr>
                        <tr>
                            <td id="menor_temp">' '</td>
                        </tr>
                    </table>
                </div>

                <div class="card">
                    <table>
                        <tr>
                            <th>Temperatura Média</th>
                        </tr>
                        <tr>
                            <td id="media_temp">' '</td>
                        </tr>
                    </table>
                    <table>
                        <tr>
                            <th>Umidade Média</th>
                        </tr>
                        <tr>
                            <td id="media_umid">' '</td>
                        </tr>
                    </table>
                </div>

                <div class="card">
                    <table>
                        <tr>
                            <th>Maior Umidade</th>
                        </tr>
                        <tr>
                            <td id="maior_umid">' '</td>
                        </tr>
                    </table>
                    <table>
                        <tr>
                            <th>Menor Umidade</th>
                        </tr>
                        <tr>
                            <td id="menor_umid">' '</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="charts">
                <div class="charts-section">
                    <div class="chart">
                        <span class="chart-title">
                            Temperatura
                        </span>
                        <canvas id="grafico_temperatura"></canvas>
                    </div>

                    <div class="chart">
                        <span class="chart-title">
                            Umidade
                        </span>
                        <canvas id="grafico_umidade"></canvas>
                    </div>
                </div>
                <div class="charts-section">
                    <div class="chart">
                        <span class="chart-title">
                            Sensores
                        </span>
                        <canvas id="grafico_sensores"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

<script>
    

    const canvasTemp = document.getElementById('grafico_temperatura');

    const chartTemp = new Chart(canvasTemp, {
        type: 'line',
        data: {
            labels:  ['12:00','13:00','14:00','15:00'],
            datasets: [
                {
                    label: 'Temperatura',
                    data: [],
                    borderWidth: 2,
                    backgroundColor: 'yellow',
                    borderColor: 'yellow',
                },
            ]
        },
        options: {
            responsive: true
        }
    });

    const canvasUmid = document.getElementById('grafico_umidade');

    const chartUmid = new Chart(canvasUmid, {
        type: 'line',
        data: {
            labels: ['12:00','13:00','14:00','15:00'],
            datasets: [
                {
                    label: 'Umidade',
                    data: [],
                    borderWidth: 2,
                    backgroundColor: 'blue',
                    borderColor: 'blue',
                },
            ]
        },
        options: {
            responsive: true
        }
    });

    const chartSensor = document.getElementById('grafico_sensores');

    new Chart(chartSensor, {
        type: 'pie',
        data: {
            datasets: [
                {
                    data: [3, 1],
                    borderWidth: 1,
                    borderColor: '#ff751f',
                    backgroundColor: ['#56b77e', 'red'],
                }
            ],
            labels: [
                'Funcionando',
                'Desligado',
            ]
        }
    })

    function selecionarGalpao(){
        let galpao = select_galpao.value;

        let maiorTemp = 0;
        let menorTemp = 0;
        let mediaTemp = 0;

        let maiorUmid = 0;
        let menorUmid = 0;
        let mediaUmid = 0;

        let tempData = [];
        let umidData = [];

        if(galpao == 1){
            tempData = [10,20,12,16];
            umidData = [75,66,71,78];

            maiorTemp = 20;
            menorTemp = 10;
            mediaTemp = 14;

            maiorUmid = 78;
            menorUmid = 66;
            mediaUmid = 72.5;

        } else if(galpao == 2){
            tempData = [15,22,17,13];
            umidData = [87,75,77,81];

            maiorTemp = 22;
            menorTemp = 13;
            mediaTemp = 16.75;

            maiorUmid = 87;
            menorUmid = 75;
            mediaUmid = 80;
        }

        maior_temp.innerHTML = `${maiorTemp}º`;
        menor_temp.innerHTML = `${menorTemp}º`;
        media_temp.innerHTML = `${mediaTemp}º`;

        maior_umid.innerHTML = `${maiorUmid}%`;
        menor_umid.innerHTML = `${menorUmid}%`;
        media_umid.innerHTML = `${mediaUmid}%`;

        chartTemp.data.datasets[0].data = tempData;
        chartUmid.data.datasets[0].data = umidData;

        chartTemp.update();
        chartUmid.update();

    };
</script>
