<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" href="../src/img/icon/logo.svg">

    <link rel="stylesheet" href="../src/css/global-style.css">
    <link rel="stylesheet" href="../src/css/login-style.css">
</head>

<body>
    <header>
        <a href="../index.html">
            <img src="../src/img/icon/logo.svg" width="35px" alt="">
            <span>SILK CO.</span>
        </a>
    </header>

    <main class="cadastro">
        <div class="main-content">
            <div class="redirect">
                <span>Já possui uma conta?</span>
                <a href="login.html"><button class="redirect-button">Login</button></a>
            </div>

            <div class="form-box">
                <div class="form-section1">
                    <h1 class="form-title">Cadastro do Usuário</h1>

                    <div class="input-section">
                        <div class="input">
                            <span>Usuário: </span>
                            <input type="text" class="input" placeholder="Digite seu usuário" id="ipt_usuario">
                        </div>

                        <div class="input">
                            <span>E-mail:</span>
                            <input type="text" class="input" placeholder="Digite seu email" id="ipt_email" oninput="validarEmail()">
                            <span id="txt_email" class="parametros"></span>
                        </div>

                        <div class="input">
                            <span>Senha:</span>
                            <input type="password" class="input" placeholder="Digite sua senha" id="ipt_senha" oninput="validarSenha()">
                            <span id="txt_senha" class="parametros"></span>
                        </div>
                    </div>
                </div>

                <div class="form-section-2">
                    <button class="submit-button" onclick="cadastrar()">Cadastrar</button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
<script>
    let caracteres = ['!','@','#','$','%','&','*','(',')','_','-','+','=','{','}','[',']','/','|','.',',',';',':','<','>','?']
    let verifemail = 0;
    let veriftam = 0;
    let verifcarac = 0;
    let verifmai = 0;
    let verifmin = 0;
    function validarEmail(){
        let email = ipt_email.value;

        if(email.includes('@') && email.includes('.')){
           txt_email.innerHTML = ``;
           verifemail = 1;
        }else if(email.includes('.')){
             txt_email.innerHTML = `Deve conter @`;
             verifemail = 0;
        }else if(email.includes('@')){
            txt_email.innerHTML = `Deve conter .`;
             verifemail = 0;
        }else{
            txt_email.innerHTML = `Deve conter @<br>
                                    Deve conter .`;
             verifemail = 0;
        }
    }
    
    function validarSenha(){
        let senha = ipt_senha.value;
        let tamanho = senha.length;
        let msg_tam = '';
        let msg_carac = '';
        let msg_mai = '';
        let msg_min = '';
        if(tamanho < 8){
            msg_tam = `A senha deve conter ao menos 8 caracteres<br>`
            veriftam = 0;
        }else{
            veriftam = 1;
        }
        if(validarCaractere()){
            msg_carac = `A senha deve conter ao menos 1 caractere especial<br>`
            verifcarac = 0;
        }else{
            verifcarac = 1;
        }
        if(senha.toUpperCase() == senha){
            msg_min = `A senha deve conter ao menos 1 letra minúscula<br>`
            verifmin = 0;
        }else{
            verifmin = 1;
        }
        if(senha.toLowerCase() == senha){
            msg_mai = `A senha deve conter ao menos 1 letra maiúscula<br>`
            verifmai = 0;
        }else{
            verifmai = 1;
        }

        txt_senha.innerHTML = msg_tam+msg_carac+msg_mai+msg_min;
    }
    function validarCaractere(){
        let senha = ipt_senha.value;
        for(let cont = 0;cont < caracteres.length;cont++){
            if(senha.includes(caracteres[cont])){
                return false;
            }
        }
        return true;
    }
    function cadastrar(){
        let verif = verifcarac+verifemail+verifmai+verifmin+veriftam;
        let usuario = ipt_usuario.value;
        if(verif == 5 && usuario != ''){
            alert(`Cadastrado com sucesso`);
            window.open('login.html')
        }else{
            alert(`Tem que ter todos os parâmetros`);
        }
    }
</script>
