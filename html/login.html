<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/cadastro.css">
    <link rel="stylesheet" href="./style/login.css">
    <title>Login</title>
    <link rel="icon" href="../src/img/icon/logo.svg">

    <link rel="stylesheet" href="../src/css/global-style.css">
    <link rel="stylesheet" href="../src/css/login-style.css">
</head>

<body>
    <header>
        <a href="../index.html">
            <img src="../src/img/icon/logo.svg" width="35px" alt="">
            <span>SILK CO.</span>
        </a>
    </header>
    <main class="login">
        <div class="main-content">
            <div class="form-box">
                <div class="form-section-1">
                    <h1 class="form-title">Login</h1>
                
                    <div class="input-section">
                        <div class="input">
                            <span>E-mail: </span>
                            <input type="text" class="input" id="ipt_email" placeholder="Digite seu email">
                        </div>

                        <div class="input">
                            <span>Senha: </span>
                            <input type="password" class="input" id="ipt_senha" placeholder="Digite sua senha">
                        </div>
                    </div>

                    <span class="esqueceu"><a href="#" id="esqueceu">Esqueceu sua senha?</a></span>
                </div>

                <div class="form-section-2">
                    <button class="submit-button" onclick="logar()">
                        Entrar
                    </button>
                </div>
            </div>

            <div class="redirect">
                <span>Não possui uma conta?</span>
                <a href="cadastro.html"><button class="redirect-button">Cadastro</button></a>
            </div>
        </div>
    </main>
</body>

</html>
<script>
    function logar(){
        let email = ipt_email.value;
        let senha = ipt_senha.value;

        if(email == 'brandao@sptech.school' && senha == 'Brandao*78'){
            alert('Login realizado com sucesso');
        }else{
            alert('Email e/ou senha incorreto');
        }
    }
</script>
