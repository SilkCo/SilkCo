<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/cadastro.css">
    <link rel="stylesheet" href="./style/login.css">
    <title>Document</title>
</head>

<body>
    <div class="conteudo">
        <div class="pergunta">
            <h1 class="titulo-login">Não possui um cadastro?</h1>
            <button class="botao-login">Cadastro</button>
        </div>
        <div class="card">
            <div class="cont-card">
                <h1 class="titulo-card">Login</h1>
                <div class="area-input">
                    <input type="text" class="input" placeholder="Digite seu email">
                    <input type="password" class="input" placeholder="Digite sua senha">
                </div>
                <h2 class="esqueceu"><a href="#" id="esqueceu">Esqueceu sua senha?</a></h2>
                <button class="botao-card">Login</button>
            </div>
        </div>
    </div>
</body>

</html>
