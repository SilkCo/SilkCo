<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/cadastro.css">
    <title>Document</title>
</head>

<body>
    <div class="conteudo">
        <div class="pergunta">
            <h1 class="titulo-login">Sua empresa possui<br>cadastro?</h1>
            <a href="login.html"><button class="botao-login">Login</button></a>
        </div>
        <div class="card">
            <div class="cont-card">
                <h1 class="titulo-card">Cadastro da Empresa</h1>
                <div class="area-input">
                    <input type="text" class="input" placeholder="Digite sua empresa">
                    <input type="text" class="input" placeholder="Digite o telefone da sua empresa">
                    <input type="text" class="input" placeholder="Digite o CEP da sua empresa">
                    <input type="text" class="input" placeholder="Digite o CNPJ da sua empresa">
                </div>
                <button class="botao-card">Cadastrar</button>
            </div>
        </div>
    </div>
</body>

</html>
